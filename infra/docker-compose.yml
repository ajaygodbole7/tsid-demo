services:
  # --------------------------------------------------
  # Postgres — stores TSID as BIGINT
  # --------------------------------------------------
  postgres:
    image: postgres:18-alpine
    container_name: tsid_demo_postgres
    environment:
      POSTGRES_DB: tsiddemo
      POSTGRES_USER: demouser
      POSTGRES_PASSWORD: demopass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demouser -d tsiddemo"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------
  # MongoDB — stores TSID as NumberLong _id (WiredTiger)
  # --------------------------------------------------
  mongodb:
    image: mongo:8.2.7
    container_name: tsid_demo_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: demouser
      MONGO_INITDB_ROOT_PASSWORD: demopass
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  default:
    name: tsid-demo
    driver: bridge
